version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: masoi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: masoi
      POSTGRES_USER: masoi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-masoi_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - masoi-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masoi -d masoi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: masoi-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - masoi-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: masoi-server
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://masoi:${POSTGRES_PASSWORD:-masoi_secret}@postgres:5432/masoi
      REDIS_URL: redis://redis:6379
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - masoi-net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: masoi-client
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - masoi-net

volumes:
  postgres_data:
  redis_data:

networks:
  masoi-net:
    driver: bridge
